
<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydrauliikka-Akatemia</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: 

#f8fafc; color: #1e293b; margin: 0; padding: 0; }
.container { max-width: 1000px; margin: 0 auto; padding: 20px; }
.card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 24px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
.card:hover { transform: translateY(-2px); transition: transform 0.2s; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
.btn { cursor: pointer; padding: 10px 20px; border-radius: 8px; font-weight: bold; border: none; transition: background 0.2s; display: inline-flex; align-items: center; gap: 8px; font-size: 14px; }
.btn-blue { background: #2563eb; color: white; }
.btn-blue:hover { background: #1d4ed8; }
.btn-green { background: #16a34a; color: white; }
.btn-green:hover { background: #15803d; }
.btn-orange { background: #ea580c; color: white; }

.btn-gray { background: #f1f5f9; color: #475569; }
.btn-gray:hover { background: #e2e8f0; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.grid-2 { display: grid; grid-template-columns: 1fr; gap: 20px; }
@media (min-width: 768px) { .grid-2 { grid-template-columns: 1fr 1fr; } }

.header { text-align: center; margin-bottom: 40px; }
.title { font-size: 2.5rem; font-weight: 900; color: #0f172a; margin: 0; }
.subtitle { color: #64748b; font-size: 1.1rem; }
.accent { color: #2563eb; }

.lab-layout { display: flex; flex-direction: column; height: 90vh; }
.lab-top { background: white; padding: 15px; border-bottom: 1px solid #e2e8f0; display: flex; 

justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
.lab-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
@media (min-width: 768px) { .lab-content { flex-direction: row; } }
.visual-area { flex: 1; background: #f1f5f9; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 400px; }
.sidebar { width: 100%; padding: 20px; background: white; border-left: 1px solid #e2e8f0; overflow-y: auto; }
@media (min-width: 768px) { .sidebar { width: 300px; } }

.selector-btn { padding: 6px 12px; border-radius: 6px; border: 1px solid #cbd5e1; background: white; cursor: pointer; font-size: 14px; font-weight: bold; }

.selector-btn.active { background: #1e293b; color: white; border-color: #1e293b; }

.svg-container { width: 100%; height: 100%; max-height: 400px; background: white; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }

#error-display { display: none; padding: 20px; background: #fee2e2; color: #991b1b; border: 2px solid #ef4444; margin: 20px; border-radius: 8px; }
</style>

<script>
window.onerror = function(message, source, lineno, colno, error) {
const loader = document.getElementById('loading');
if (loader) loader.style.display = 'none';

const el = document.getElementById('error-display');
if (el) {
el.style.display = 'block';
el.innerHTML = '<strong>VIRHE:</strong> ' + message + '<br><small>Rivillä: ' + lineno + '</small>';
}
};
</script>
</head>
<body>

<div id="loading" style="text-align:center; padding: 50px; font-family: sans-serif; color: #64748b;">
<h1>Ladataan sovellusta...</h1>
<p>Odota hetki.</p>
</div>

<div id="error-display"></div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// --- ICON COMPONENTS ---
const Icon = ({ name }) => {
if (name === 'Microscope') return <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 18h8"/><path d="M3 22h18"/><path d="M14 22a7 7 0 1 0 0-14h-1"/><path d="M9 14h2"/><path d="M8 6h2v6H8z"/></svg>;
if (name === 'Trophy') return <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path 

d="M4 22h16"/><path d="M2 17h20"/><path d="M12 3a6 6 0 0 0-6 6v3a6 6 0 1 0 12 0V9a6 6 0 0 0-6-6z"/></svg>;
if (name === 'ArrowRight') return <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>;
if (name === 'Menu') return <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12h18"/><path d="M3 6h18"/><path d="M3 18h18"/></svg>;
if (name === 'CheckCircle') return <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#16a34a" strokeWidth="2"><circle cx="12" cy="12" r="10" stroke="currentColor" fill="none"/><path d="M9 12l2 2 4-4" stroke="currentColor"/></svg>;
if (name === 'XCircle') return <svg width="24" 

height="24" viewBox="0 0 24 24" fill="none" stroke="#dc2626" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6"/><path d="M9 9l6 6"/></svg>;
if (name === 'Award') return <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ca8a04" strokeWidth="2"><circle cx="12" cy="8" r="7"/><path d="M8.21 13.89L7 23l5-3 5 3-1.21-9.12"/></svg>;
return null;
};

// --- VISUALISOINTI ---
const ConnectorVisual = ({ type, isTightened, showAngle, showDetails, hasTape, hideLabels }) => {

if (type === 'JIC') {
const xPos = isTightened ? 140 : 200;
return (

<g transform="translate(0, 20)">
<g transform="translate(20, 100)">
<path d="M0,-50 L80,-50 L120,-20 L120,20 L80,50 L0,50 Z" fill="#64748B" stroke="#334155" strokeWidth="2" />
{showAngle && <path d="M80,-50 L120,-20 M80,50 L120,20" stroke="#EF4444" strokeWidth="3" />}
{!hideLabels && <text x="10" y="-60" fontSize="10" fill="#334155" fontWeight="bold">JIC UK</text>}
</g>
<g transform={translate(${xPos}, 100)`} style={{transition: 'transform 1s'}}>
<path d="M-65,-65 L65,-65 L65,65 L-65,65 Z" fill="#E2E8F0" stroke="#94A3B8" strokeWidth="1" opacity="0.5" />
<path d="M65,-20 L0,-20 L-40,-50 L65,-50 Z" fill="#CBD5E1" stroke="#475569" strokeWidth="2" />

<path d="M65,20 L0,20 L-40,50 L65,50 Z" fill="#CBD5E1" stroke="#475569" strokeWidth="2" />
{!hideLabels && <text x="10" y="-70" fontSize="10" fill="#475569" fontWeight="bold">JIC SK</text>}
</g>
</g>
);
}

if (type === 'BSP') {
const xPos = isTightened ? 128 : 180;
return (
<g transform="translate(0, 20)">
<g transform="translate(40, 100)">
<path d="M0,-50 L100,-50 L100,-35 L85,-20 L0,-20 Z" fill="#9CA3AF" stroke="#4B5563" strokeWidth="2" />
<path d="M0,50 L100,50 L100,35 L85,20 L0,20 Z" 

fill="#9CA3AF" stroke="#4B5563" strokeWidth="2" />
{showAngle && <path d="M100,-35 L85,-20 M100,35 L85,20" stroke="#EF4444" strokeWidth="3" strokeDasharray="4 2" />}
{!hideLabels && <text x="0" y="-60" fontSize="10" fill="#374151" fontWeight="bold">BSP UK</text>}
</g>
<g transform={translate(${xPos}, 100)`} style={{transition: 'transform 1s'}}>
<path d="M-10,-65 L60,-65 L60,65 L-10,65 Z" fill="#E5E7EB" stroke="#9CA3AF" strokeWidth="2" opacity="0.5"/>
<path d="M0,-20 L15,-35 L80,-35 L80,-20 L0,-20 Z" fill="#64748B" stroke="#334155" strokeWidth="2" />
<path d="M0,20 L15,35 L80,35 L80,20 L0,20 Z" fill="#64748B" stroke="#334155" strokeWidth="2" />

{showAngle && <path d="M0,-20 L15,-35 M0,20 L15,35" stroke="#EF4444" strokeWidth="3" />}
{!hideLabels && <text x="25" y="-60" fontSize="10" fill="#374151" fontWeight="bold">BSP SK</text>}
</g>
</g>
);
}

if (type === 'ORFS') {
const xPos = isTightened ? 122 : 180;
return (
<g transform="translate(0, 20)">
<g transform="translate(20, 100)">
<path d="M0,-30 L100,-30 L100,-12 L0,-12 Z" fill="#9CA3AF" stroke="#4B5563" strokeWidth="2" />
<path d="M0,30 L100,30 L100,12 L0,12 Z" fill="#9CA3AF" stroke="#4B5563" 

strokeWidth="2" />

<g stroke="#94A3B8" strokeWidth="2">
{[10, 20, 30, 40, 50, 60, 70, 80, 90].map(x => (
<g key={x}>
<line x1={x} y1="-30" x2={x+5} y2="-35" />
<line x1={x} y1="30" x2={x+5} y2="35" />
</g>
))}
</g>

<rect x="95" y="-26" width="5" height="10" fill="#E5E7EB" stroke="none" />
<rect x="95" y="16" width="5" height="10" fill="#E5E7EB" stroke="none" />

<line x1="100" y1="-30" x2="100" y2="-12" stroke="#374151" strokeWidth="3" />
<line x1="100" y1="30" x2="100" y2="12" stroke="#374151" strokeWidth="3" />


{showDetails && (
<g>
<circle cx="100" cy="-21" r="4.5" fill="#EF4444" stroke="#7F1D1D" strokeWidth="1" />
<circle cx="100" cy="21" r="4.5" fill="#EF4444" stroke="#7F1D1D" strokeWidth="1" />
<path d="M102,-21 Q110,0 102,21" fill="none" stroke="#EF4444" strokeWidth="2" opacity="0.6" />
</g>
)}
{!hideLabels && <text x="10" y="-45" fontSize="10" fill="#374151" fontWeight="bold">ORFS UK</text>}
</g>
<g transform={translate(${xPos}, 100)`} style={{transition: 'transform 1s'}}>
<path d="M-30,-45 L40,-45 L40,45 L-30,45 Z" fill="#E2E8F0" stroke="#94A3B8" 

strokeWidth="1" opacity="0.5" />
<line x1="-30" y1="-45" x2="-30" y2="-30" stroke="#64748B" strokeWidth="2"/>
<line x1="-30" y1="45" x2="-30" y2="30" stroke="#64748B" strokeWidth="2"/>

<path d="M40,-12 L0,-12 L0,-30 L40,-30 Z" fill="#CBD5E1" stroke="#475569" strokeWidth="2" />
<path d="M40,12 L0,12 L0,30 L40,30 Z" fill="#CBD5E1" stroke="#475569" strokeWidth="2" />

<line x1="0" y1="-30" x2="0" y2="-12" stroke="#1F2937" strokeWidth="3" />
<line x1="0" y1="30" x2="0" y2="12" stroke="#1F2937" strokeWidth="3" />

{!hideLabels && <text x="10" y="-55" fontSize="10" fill="#475569" 

fontWeight="bold">ORFS SK</text>}
</g>
</g>
);
}

if (type === 'DIN') {
const xPos = isTightened ? 130 : 190;
return (
<g transform="translate(0, 20)">
<g transform="translate(20, 100)">
<path d="M0,-45 L80,-45 L110,-20 L110,20 L80,45 L0,45 Z" fill="#64748B" stroke="#334155" strokeWidth="2" />
<rect x="92" y="-36.5" width="6" height="8" rx="3" fill="#1F2937" transform="rotate(40 95 -32.5)" />
<rect x="92" y="28.5" width="6" height="8" rx="3" fill="#1F2937" transform="rotate(-40 95 32.5)" />
{showAngle && <path d="M80,-45 L110,-20 M80,45 L110,20" stroke="#EF4444" 

strokeWidth="3" />}
{!hideLabels && <text x="10" y="-60" fontSize="10" fill="#334155" fontWeight="bold">DIN UK</text>}
</g>
<g transform={translate(${xPos}, 100)`} style={{transition: 'transform 1s'}}>
<path d="M-60,-60 L60,-60 L60,60 L-60,60 Z" fill="#E2E8F0" stroke="#94A3B8" strokeWidth="1" opacity="0.5" />
<path d="M60,-20 L0,-20 L-30,-45 L60,-45 Z" fill="#CBD5E1" stroke="#475569" strokeWidth="2" />
<path d="M60,20 L0,20 L-30,45 L60,45 Z" fill="#CBD5E1" stroke="#475569" strokeWidth="2" />
{!hideLabels && <text x="10" y="-70" fontSize="10" fill="#475569" fontWeight="bold">DIN SK</text>}
</g>

</g>
);
}

if (type === 'NPT') {
const xPos = isTightened ? 80 : 160;
return (
<g transform="translate(0, 20)">
<g transform="translate(20, 100)">
<path d="M0,-55 L100,-40 L100,40 L0,55 Z" fill="#64748B" stroke="#334155" strokeWidth="2" />
{hasTape && <path d="M10,-53 L90,-41 L90,41 L10,53 Z" fill="white" stroke="#E2E8F0" strokeWidth="1" opacity="0.9" />}
<line x1="10" y1="-53" x2="15" y2="-57" stroke="#94A3B8" strokeWidth="2" />
<line x1="10" y1="53" x2="15" y2="57" stroke="#94A3B8" strokeWidth="2" />
<line x1="30" y1="-47" x2="35" y2="-51" 

stroke="#94A3B8" strokeWidth="2" />
<line x1="30" y1="47" x2="35" y2="51" stroke="#94A3B8" strokeWidth="2" />
<line x1="50" y1="-42" x2="55" y2="-46" stroke="#94A3B8" strokeWidth="2" />
<line x1="50" y1="42" x2="55" y2="46" stroke="#94A3B8" strokeWidth="2" />
<line x1="70" y1="-37" x2="75" y2="-41" stroke="#94A3B8" strokeWidth="2" />
<line x1="70" y1="37" x2="75" y2="41" stroke="#94A3B8" strokeWidth="2" />

{showAngle && <path d="M0,-60 L110,-42 M0,60 L110,42" stroke="#EF4444" strokeWidth="2" strokeDasharray="6 4" />}
{!hideLabels && <text x="10" y="-70" fontSize="10" fill="#334155" fontWeight="bold">NPT UK</text>}
</g>
<g transform={translate(${xPos}, 100)`} 

style={{transition: 'transform 1s'}}>
<rect x="0" y="-80" width="120" height="160" fill="#E2E8F0" stroke="#64748B" strokeWidth="2" />
<path d="M0,-48 L100,-35 L100,35 L0,48 Z" fill="#CBD5E1" stroke="#475569" strokeWidth="2" strokeDasharray="2 1" />
{!hideLabels && <text x="130" y="5" fontSize="12" fill="#64748B" fontWeight="bold" transform="rotate(90 130 5)">LOHKO</text>}
</g>
</g>
);
}
return null;
};

const labs = [
{ id: 'JIC', name: 'JIC 37°', desc: 'Metalli-metalli kartio.' },

{ id: 'BSP', name: 'BSP 60°', desc: 'Brittiläinen standardi (kuppi).' },
{ id: 'DIN', name: 'DIN 24°', desc: 'Saksalainen DKO.' },
{ id: 'ORFS', name: 'ORFS', desc: 'Tasotiiviste.' },
{ id: 'NPT', name: 'NPT', desc: 'Kartiokierre (Teippi!).' },
 ];

const quizQuestions = [
{ id: 1, type: 'visual', correct: 'JIC', question: 'Tunnista liitin', hint: 'Ulkoneva nokka, 37 astetta.', options: ['JIC', 'BSP', 'ORFS', 'NPT'] },
{ id: 2, type: 'visual', correct: 'BSP', question: 'Tunnista liitin', hint: 'Sisäkartio (kuppi) uroksessa.', options: ['JIC', 'BSP', 'DIN', 'ORFS'] },
{ id: 3, type: 'visual', correct: 'ORFS', question: 'Mikä liitin?', hint: 'Tasainen pää.', options: ['DIN', 'BSP', 'ORFS', 'JIC'] },
{ id: 4, type: 'visual', correct: 'NPT', question: 

'Tunnista kierre', hint: 'Kartiokierre.', options: ['NPT', 'JIC', 'BSP', 'ORFS'] },
{ id: 5, type: 'visual', correct: 'DIN', question: 'Tunnista', hint: 'O-rengas kartiolla (DKO).', options: ['JIC', 'DIN', 'BSP', 'ORFS'] },
];

function App() {
const [mode, setMode] = useState('menu');
const [selectedLab, setSelectedLab] = useState('JIC');
const [isTightened, setIsTightened] = useState(false);
const [showAngle, setShowAngle] = useState(false);
const [hasTape, setHasTape] = useState(false);
const [score, setScore] = useState(0);
const [qIndex, setQIndex] = useState(0);
const [feedback, setFeedback] = useState(null);

useEffect(() => {
const loader = document.getElementById('loading');
if(loader) loader.style.display = 'none';
}, []);

const resetLab = () => { setIsTightened(false); setShowAngle(false); setHasTape(false); };
const startQuiz = () => { setScore(0); setQIndex(0); setFeedback(null); setMode('quiz'); };

const handleAnswer = (ans) => {
const correct = quizQuestions[qIndex].correct;
if(ans === correct) setScore(s => s+1);
setFeedback({ isCorrect: ans === correct, correct });
};

const nextQ = () => {

if(qIndex < quizQuestions.length - 1) { setQIndex(q => q+1); setFeedback(null); }
else setMode('result');
};

if (mode === 'menu') {
return (
<div className="container">
<div className="header">
<h1 className="title">Hydrauliikka<span className="accent">Akatemia</span></h1>
<p className="subtitle">Opettele tunnistamaan liittimet</p>
</div>
<div className="grid-2">
<div className="card" onClick={() => { setMode('lab'); resetLab(); }} style={{cursor: 'pointer'}}>
<div style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'10px'}}>

<div style={{padding:'10px', background:'#dbeafe', borderRadius:'50%', color:'#2563eb'}}><Icon name="Microscope"/></div>
<h2 style={{margin:0, fontSize:'1.5rem'}}>Liitin-Labra</h2>
</div>
<p style={{color:'#64748b'}}>Vapaa harjoittelu. Tutki JIC, BSP, DIN, ORFS ja NPT liittimiä.</p>
<div style={{marginTop:'20px', color:'#2563eb', fontWeight:'bold', display:'flex', alignItems:'center', gap:'5px'}}>Siirry labraan <Icon name="ArrowRight"/></div>
</div>
<div className="card" onClick={startQuiz} style={{cursor: 'pointer'}}>
<div style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'10px'}}>
<div style={{padding:'10px', background:'#ffedd5', borderRadius:'50%', 

color:'#ea580c'}}><Icon name="Trophy"/></div>
<h2 style={{margin:0, fontSize:'1.5rem'}}>Mestaritesti</h2>
</div>
<p style={{color:'#64748b'}}>Testaa taitosi pisteytetyllä kokeella.</p>
<div style={{marginTop:'20px', color:'#ea580c', fontWeight:'bold', display:'flex', alignItems:'center', gap:'5px'}}>Aloita testi <Icon name="ArrowRight"/></div>
</div>
</div>
</div>
);
}

if (mode === 'lab') {
const current = labs.find(l => l.id === selectedLab);
return (

<div className="lab-layout">
<div className="lab-top">
<div style={{display:'flex', alignItems:'center', gap:'10px'}}>
<button className="btn btn-gray" onClick={() => setMode('menu')}><Icon name="Menu"/> Valikko</button>
<h2 style={{margin:0}}>Liitin-Labra</h2>
</div>
<div style={{display:'flex', gap:'5px', flexWrap:'wrap'}}>
{labs.map(l => (
<button key={l.id}
className={selector-btn${selectedLab === l.id ? 'active' : ''}`}
onClick={() => { setSelectedLab(l.id); resetLab(); }}>
{l.id}
</button>
))}

</div>
</div>
<div className="lab-content">
<div className="visual-area">
<div style={{position:'absolute', top:20, left:20, background:'white', padding:10, borderRadius:8, border:'1px solid #ccc', zIndex:10}}>
<strong>{current.name}</strong><br/><small>{current.desc}</small>
</div>
<div className="svg-container">
<svg viewBox="0 0 400 200" style={{width:'100%', height:'100%'}}>
<line x1="0" y1="100" x2="400" y2="100" stroke="#e2e8f0" strokeWidth="1" strokeDasharray="4 4"/>
<ConnectorVisual type={selectedLab} isTightened={isTightened} showAngle={showAngle} showDetails={true} hasTape={hasTape} />

{selectedLab === 'NPT' && isTightened && !hasTape && (
<g transform="translate(130, 150)">
<rect width="140" height="30" rx="4" fill="#fee2e2" stroke="#dc2626"/>
<text x="70" y="20" textAnchor="middle" fill="#dc2626" fontWeight="bold" fontSize="12">⚠️ VUOTOVAARA</text>
</g>
)}
</svg>
</div>
<div style={{marginTop: 20, display:'flex', gap:10, flexWrap:'wrap', justifyContent:'center'}}>
<button className="btn btn-gray" onClick={() => setShowAngle(!showAngle)}>Kulma</button>
{selectedLab === 'NPT' && (
<button className="btn btn-blue" onClick={() => !isTightened && setHasTape(!hasTape)} disabled={isTightened}>

{hasTape ? 'Teippi OK' : 'Lisää Teippi'}
</button>
)}
<button className={isTightened ? "btn btn-gray" : "btn btn-green"} onClick={() => setIsTightened(!isTightened)}>
{isTightened ? 'Avaa liitos' : 'Kiristä liitos'}
</button>
</div>
</div>
</div>
</div>
);
}

if (mode === 'quiz') {
const q = quizQuestions[qIndex];
return (
<div className="container" style={{maxWidth:'600px', marginTop:'40px'}}>

<div className="card">
<div style={{display:'flex', justifyContent:'space-between', marginBottom:20}}>
<h2 style={{margin:0}}>Kysymys {qIndex+1}/{quizQuestions.length}</h2>
<span style={{fontSize:'1.5rem', fontWeight:'bold'}}>{score} pts</span>
</div>
<h3>{q.question}</h3>
{q.type === 'visual' && (
<div style={{background:'#f1f5f9', height:150, borderRadius:8, margin:'20px 0', border:'1px solid #e2e8f0'}}>
<svg viewBox="0 0 400 200" style={{width:'100%', height:'100%'}}>
<ConnectorVisual type={q.correct} isTightened={false} showAngle={false} showDetails={true} hasTape={false} hideLabels={true} />
</svg>

</div>
)}
{!feedback ? (
<div className="grid-2">
{q.options.map(opt => (
<button key={opt} className="btn btn-gray" style={{justifyContent:'center', fontSize:'1.2rem'}} onClick={() => handleAnswer(opt)}>{opt}</button>
))}
</div>
) : (
<div style={{textAlign:'center'}}>
<div style={{fontSize:'1.5rem', color: feedback.isCorrect ? '#16a34a' : '#dc2626', marginBottom:20}}>
{feedback.isCorrect ? 'Oikein!' : Väärin. Oikea oli ${feedback.correct}.}
</div>
{!feedback.isCorrect && <p 

style={{color:'#64748b'}}>{q.hint}</p>}
<button className="btn btn-blue" onClick={nextQ}>Seuraava <Icon name="ArrowRight"/></button>
</div>
)}
</div>
</div>
);
}

if (mode === 'result') {
return (
